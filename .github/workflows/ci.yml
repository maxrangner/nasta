name: CI

on:
  push:
  pull_request:

jobs:
  host-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.3

      - name: Configure host tests
        run: cmake -S test -B test/build -G Ninja

      - name: Build host tests
        run: cmake --build test/build

      - name: Run host tests
        run: ctest --test-dir test/build --output-on-failure

  build:
    runs-on: ubuntu-latest
    needs: host-tests

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ESP-IDF
        uses: espressif/install-esp-idf-action@v1
        with:
          version: v5.5.3

      - name: Build firmware
        run: idf.py build
